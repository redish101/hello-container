<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>{{.Title}}</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #fff;
    color: #111;
}

.container {
    max-width: 1100px;
    margin: 48px auto;
    padding: 0 24px;
}

.header {
    text-align: left;
    font-size: 24px;
    font-weight: 650;
    margin-bottom: 28px;
    color: #111;
}

.group {
    margin-bottom: 28px;
}

/* 🔥 小标题稍微加强 */
.group-title {
    font-size: 15px;      /* 从 13 → 15 */
    font-weight: 650;
    color: #333;          /* 从 #444 → 更实一点 */
    margin-bottom: 12px;  /* 稍微拉开一点 */
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 8px 18px;
}

.item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 4px 6px;
}

.key {
    font-size: 13px;
    font-weight: 600;
    color: #222;
}

.value {
    font-size: 13px;
    font-weight: 500;
    color: #555;
    text-align: right;
    max-width: 65%;
    word-break: break-word;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
{{.Title}}
</div>

{{range $group, $items := .Groups}}
<div class="group">

    <div class="group-title">
        {{$group}}
    </div>

    <div class="grid">
        {{range $items}}
        <div class="item">
            <div class="key">{{.Name}}</div>
            <div class="value">{{.Value}}</div>
        </div>
        {{end}}
    </div>

</div>
{{end}}

</div>

</body>
</html>
